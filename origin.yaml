# ==================== 基础端口 ====================
port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: false
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: '127.0.0.1:9090'

# ==================== 全局优化 ====================
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome
find-process-mode: strict

# ==================== 系统时间同步 ====================
ntp:
  enable: true
  write-to-system: false
  server: ntp.aliyun.com
  port: 123
  interval: 30

# ==================== 流量嗅探 ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true

# ==================== DNS 配置 ====================
dns:
  enable: true
  listen: ':53'
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    
  fake-ip-filter:
    - '*.icbc.com.cn'
    - '*.ccb.com'
    - '*.abchina.com'
    - '*.bankcomm.com'
    - '*.cmbchina.com'
    - '*.psbc.com'
    - '*.pingan.com.cn'
    - '*.cgbchina.com.cn'
    - '*.cebbank.com'
    - '*.citicbank.com'

# ==================== TUN 透明代理 ====================
tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - 'any:53'
  device: SakuraiTunnel
  mtu: 1500
  endpoint-independent-nat: true
proxies:  # 这里的内容会被替换
  - name: "example"
    type: "ss"
    server: "example.com"
    port: 443
    cipher: "aes-256-gcm"
    password: "password"
    udp: true
proxy-groups:
  - name: ✅节点选择
    type: select
    proxies:
      - 🚀最低延迟
      - ♻️自动切换
      - ⚖️负载均衡
      - DIRECT
  - name: 🕸GPT
    type: select
    proxies:

  - name: 🎧Spotify
    type: select
    proxies:
      - 🚀最低延迟
      - ♻️自动切换
  - name: Ⓜ️微软服务
    type: select
    proxies:
      - 🔗直连
      - ✅节点选择
  - name: 🍎苹果
    type: select
    proxies:
      - 🔗直连
      - ✅节点选择
  - name: 🅰️Adobe
    type: select
    proxies:
      - REJECT
      - DIRECT
      - ✅节点选择 
  - name: ♻️自动切换
    type: fallback
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 300
    proxies:
  - name: 🚀最低延迟
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 300
    proxies:    
  - name: ⚖️负载均衡
    type: load-balance
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 300
    proxies:
  - name: 🔗直连
    type: select
    proxies:
      - DIRECT
      - ✅节点选择
  - name: 🛑拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 🚀最低延迟
      - ♻️自动切换
  - name: ⛔过滤
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 🚀最低延迟
      - ♻️自动切换
  - name: 中转
    type: select
    proxies:
      - ✅节点选择
      - 🔗直连
